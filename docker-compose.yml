version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: smolrouter-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - "./redis_data:/data"

  smolrouter:
    image: ghcr.io/mitchins/smolrouter:latest
    container_name: smolrouter
    ports:
      - "8088:8088"
    volumes:
      # Bind mount your configuration file
      - "./routes.yaml:/app/config/routes.yaml:ro"
      # Persist request/response blob storage
      - "./blob_storage:/app/blob_storage"
      # Persist rotated ERROR logs across container restarts; ensure ./logs is writable on the host
      - "./logs:/app/logs"
    environment:
      # Configuration
      - ROUTES_CONFIG=/app/config/routes.yaml
      - REDIS_URL=redis://redis:6379/0
      - BLOB_STORAGE_PATH=/app/blob_storage

      # Server settings
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=8088

      # Optional: Google GenAI rate limiting (already configured with good defaults)
      - GOOGLE_GENAI_MAX_CONCURRENT=3
      - GOOGLE_GENAI_MAX_REQUESTS_PER_WINDOW=12
      - GOOGLE_GENAI_WINDOW_MINUTES=4
      - GOOGLE_GENAI_RATE_LIMITING_ENABLED=true

      # Optional: Request timeout
      - REQUEST_TIMEOUT=3000

      # Optional: Logging
      - ENABLE_LOGGING=true
      - MAX_LOG_AGE_DAYS=7
      - LOG_DIR=/app/logs
      - ERROR_LOG_FILE=/app/logs/error.log
      - ERROR_LOG_MAX_BYTES=10485760
      - ERROR_LOG_BACKUP_COUNT=5

    depends_on:
      - redis

    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
