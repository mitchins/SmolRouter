sonar.projectKey=mitchins_SmolRouter
sonar.organization=mitchins

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=SmolRouter
#sonar.projectVersion=1.0

# Sources and tests configuration
sonar.sources=smolrouter
sonar.tests=tests

# Exclusions for test files and generated files
sonar.test.inclusions=tests/**/*.py
# Exclude only the exact vendored, upstream, minified third-party asset
# (Chart.js 4.5.1, MIT) from analysis. It is generated code we did not write
# and vendor solely to avoid external browser requests; provenance/version are
# recorded in smolrouter/static/vendor/README.md. First-party templates,
# static CSS, and application code stay in scope.
sonar.exclusions=**/__pycache__/**,**/venv/**,**/.venv/**,**/node_modules/**,**/*.pyc,smolrouter/models/**/*.json,smolrouter/static/vendor/chart.umd.min.js

# Python specific configuration
sonar.python.version=3.11,3.12

# Coverage configuration
sonar.python.coverage.reportPaths=coverage.xml

# Encoding of the source code
sonar.sourceEncoding=UTF-8