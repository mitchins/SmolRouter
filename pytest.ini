[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = -v --tb=short
markers =
    performance: Performance tests (TPS, throughput, load testing)
filterwarnings =
    # Suppress Jinja2 utcnow() deprecation emitted during template rendering/import
    ignore:datetime\.datetime\.utcnow\(\) is deprecated:DeprecationWarning:jinja2\.runtime
